services:
  - type: web
    name: lenda-bot-dashboard
    runtime: python
    rootDir: web
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PASS
        sync: false
      - key: PORT
        value: 8080
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
