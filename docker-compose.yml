# docker-compose.yml — FIFA Bet Alert System
# Deploy 24/7 com auto-restart, watchdog, e resource limits

services:
  fifa-bet-alert:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fifa-bet-alert
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

  # Watchdog: reinicia o container principal se o healthcheck falhar
  # e envia notificacao via Telegram
  autoheal:
    image: willfarrell/autoheal
    container_name: fifa-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=60
      - AUTOHEAL_START_PERIOD=120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
